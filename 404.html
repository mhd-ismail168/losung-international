<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Losung International</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

    <style>
        .not-found-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: var(--color-navy);
            color: #fff;
            padding: 2rem;
        }

        .logo-container {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }
    </style>

  <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">
  <link rel="manifest" href="/images/favicon/site.webmanifest">
  <link rel="shortcut icon" href="/images/favicon/favicon.ico">

</head>

<body>

    <div class="logo-container">
        <a href="/" class="logo" style="text-decoration: none; display: flex; align-items: center; gap: 5px;">
            <span class="text-white"
                style="font-family: var(--font-sans); font-weight: 700; font-size: 1.5rem; letter-spacing:-1px;">Losung</span>
            <span class="text-gold"
                style="font-family: var(--font-sans); font-weight: 700; font-size: 1.5rem; letter-spacing:-1px;">International</span>
        </a>
    </div>

    <div class="not-found-container">
        <h1
            style="font-family: var(--font-playfair); font-size: 8rem; color: var(--color-gold); margin-bottom: 0.5rem; line-height: 1;">
            404</h1>
        <h2 style="font-family: var(--font-sans); font-size: 2.5rem; margin-bottom: 1rem; font-weight: 600;">Page Not
            Found</h2>
        <p style="font-size: 1.2rem; opacity: 0.8; margin-bottom: 2.5rem; max-width: 500px; line-height: 1.6;">The page
            you are looking for does not exist or has been moved.</p>
        <a href="/" class="btn btn-gold-glow"
            style="padding: 1rem 2.5rem; font-size: 1.1rem; border-radius: 50px; text-decoration: none;">Return to
            Homepage</a>
    </div>

</body>

</html>
